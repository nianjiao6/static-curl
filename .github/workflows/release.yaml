name: build-and-release

on:
  # run it manually
  workflow_dispatch:
    inputs:
      CURL_VERSION:
        description: 'cURL Version'
        required: false
        default: '8.19.0'
        type: string
      ENABLE_ECH:
        description: 'Enable ECH Support'
        required: false
        default: false
        type: boolean
      OPENSSL_VERSION:
        description: 'OpenSSL Version'
        required: false
        default: '3.6.1'
        type: string
      OPENSSL_BRANCH:
        description: 'OpenSSL Branch'
        required: false
        default: 'feature/ech'
        type: string

jobs:
  build-Linux:
    name: build-Linux-glibc (${{ github.ref_name }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set build variables
        run: |
          echo "ARCHES=aarch64 armv7" >> $GITHUB_ENV
          echo "CURL_VERSION=${{ inputs.CURL_VERSION }}" >> $GITHUB_ENV
          echo "ENABLE_ECH=${{ inputs.ENABLE_ECH }}" >> $GITHUB_ENV
          echo "TLS_LIB=openssl" >> $GITHUB_ENV
          echo "OPENSSL_VERSION=${{ inputs.OPENSSL_VERSION }}" >> $GITHUB_ENV
          echo "OPENSSL_BRANCH=${{ inputs.OPENSSL_BRANCH }}" >> $GITHUB_ENV
          echo "NGTCP2_VERSION=1.21.0" >> $GITHUB_ENV
          echo "NGHTTP3_VERSION=1.15.0" >> $GITHUB_ENV
          echo "NGHTTP2_VERSION=1.68.0" >> $GITHUB_ENV
          echo "LIBIDN2_VERSION=2.3.8" >> $GITHUB_ENV
          echo "LIBUNISTRING_VERSION=1.3" >> $GITHUB_ENV
          echo "ZLIB_VERSION=1.3.2" >> $GITHUB_ENV
          echo "BROTLI_VERSION=1.2.0" >> $GITHUB_ENV
          echo "ZSTD_VERSION=1.5.7" >> $GITHUB_ENV
          echo "LIBSSH2_VERSION=1.11.1" >> $GITHUB_ENV
          echo "ARES_VERSION=1.34.6" >> $GITHUB_ENV
          echo "LIBC=glibc" >> $GITHUB_ENV
          echo "QBT_MUSL_CROSS_MAKE_VERSION=2612" >> $GITHUB_ENV
          echo "CONTAINER_IMAGE=debian:latest" >> $GITHUB_ENV
          echo "TOKEN_READ=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Cross Build Static cURL
        run: sh curl-static-cross.sh

      - name: Set up environment
        run: |
          VERSION=`cat release/version.txt`
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload artifact (version)
        uses: actions/upload-artifact@v6
        with:
          name: curl-version
          path: release/version.txt
          retention-days: 90
          if-no-files-found: error
          overwrite: true

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: curl-binary-linux-${{ env.VERSION }}
          path: release
          retention-days: 90
          if-no-files-found: error
          overwrite: true

  build-Linux-musl:
    name: build-Linux-musl (${{ github.ref_name }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set build variables
        run: |
          echo "ARCHES=aarch64 armv7" >> $GITHUB_ENV
          echo "CURL_VERSION=${{ inputs.CURL_VERSION }}" >> $GITHUB_ENV
          echo "ENABLE_ECH=${{ inputs.ENABLE_ECH }}" >> $GITHUB_ENV
          echo "TLS_LIB=openssl" >> $GITHUB_ENV
          echo "OPENSSL_VERSION=${{ inputs.OPENSSL_VERSION }}" >> $GITHUB_ENV
          echo "OPENSSL_BRANCH=${{ inputs.OPENSSL_BRANCH }}" >> $GITHUB_ENV
          echo "NGTCP2_VERSION=1.21.0" >> $GITHUB_ENV
          echo "NGHTTP3_VERSION=1.15.0" >> $GITHUB_ENV
          echo "NGHTTP2_VERSION=1.68.0" >> $GITHUB_ENV
          echo "LIBIDN2_VERSION=2.3.8" >> $GITHUB_ENV
          echo "LIBUNISTRING_VERSION=1.3" >> $GITHUB_ENV
          echo "ZLIB_VERSION=1.3.2" >> $GITHUB_ENV
          echo "BROTLI_VERSION=1.2.0" >> $GITHUB_ENV
          echo "ZSTD_VERSION=1.5.7" >> $GITHUB_ENV
          echo "LIBSSH2_VERSION=1.11.1" >> $GITHUB_ENV
          echo "ARES_VERSION=1.34.6" >> $GITHUB_ENV
          echo "LIBC=musl" >> $GITHUB_ENV
          echo "QBT_MUSL_CROSS_MAKE_VERSION=2612" >> $GITHUB_ENV
          echo "STATIC_LIBRARY=1" >> $GITHUB_ENV
          echo "CONTAINER_IMAGE=debian:latest" >> $GITHUB_ENV
          echo "TOKEN_READ=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Cross Build Static cURL
        run: sh curl-static-cross.sh

      - name: Set up environment
        run: |
          VERSION=`cat release/version.txt`
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload artifact (version)
        uses: actions/upload-artifact@v6
        with:
          name: curl-version
          path: release/version.txt
          retention-days: 90
          if-no-files-found: error
          overwrite: true

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: curl-binary-linux-musl-${{ env.VERSION }}
          path: release
          retention-days: 90
          if-no-files-found: error
          overwrite: true

  release:
    name: release curl (${{ github.ref_name }})
    needs: [build-Linux, build-Linux-musl]
    if: >-
      !cancelled() && !failure() &&
      (needs.build-Linux.result == 'success' ||
       needs.build-Linux-musl.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: curl-version
          path: curl-version

      - name: Set up environment
        run: |
          VERSION=`cat curl-version/version.txt`
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set RELEASE_TAG
        run: |
          if [ "${{ inputs.ENABLE_ECH }}" = "true" ]; then
            RELEASE_TAG="${{ env.VERSION }}-ech"
          else
            RELEASE_TAG="${{ env.VERSION }}"
          fi
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "Will release as: $RELEASE_TAG"

      - name: Download artifact (linux)
        if: needs.build-Linux.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: curl-binary-linux-${{ env.VERSION }}
          path: release

      - name: Download artifact (linux-musl)
        if: needs.build-Linux-musl.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: curl-binary-linux-musl-${{ env.VERSION }}
          path: release

      - name: List compiled files
        run: |
          ls -l release/*
          echo
          file release/bin/curl-*
          echo
          cat release/version-info.txt 2>/dev/null || true
          echo
          sha256sum release/bin/curl-*

      - name: Compress and Create Release Note
        env:
          TLS_LIB: openssl
          CURL_VERSION: ${{ env.VERSION }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          bash release.sh

      - name: List compressed files
        run: ls -l release/*

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          files: |
            release/bin/curl-*.tar.xz
            release/curl-*.tar.xz
          body_path: release/release.md
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          make_latest: ${{ env.RELEASE_TAG == env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: curl-release-${{ env.RELEASE_TAG }}
          path: release
          retention-days: 90
          if-no-files-found: error
          overwrite: true
